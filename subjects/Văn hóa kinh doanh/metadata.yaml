subject_code: "BC"
subject_name: "Văn hóa kinh doanh"
credits: 3
faculty: "Business Administration"
description: "Cung cấp kiến thức về văn hóa kinh doanh, đạo đức kinh doanh, trách nhiệm xã hội doanh nghiệp (CSR), và giao tiếp kinh doanh trong bối cảnh hội nhập quốc tế."
learning_outcomes:
  - "Hiểu các khái niệm và thành phần của văn hóa doanh nghiệp và văn hóa kinh doanh"
  - "Phân biệt các mô hình văn hóa quốc gia (Hofstede, GLOBE) và ảnh hưởng đến kinh doanh"
  - "Nhận biết và áp dụng các tiêu chuẩn đạo đức kinh doanh quốc tế"
  - "Hiểu trách nhiệm xã hội doanh nghiệp (CSR) và phát triển bền vững"
  - "Thực hành giao tiếp, đàm phán và đối sách trong môi trường văn hóa đa dạng"
