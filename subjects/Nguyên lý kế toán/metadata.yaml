subject_code: "AF"
subject_name: "Nguyên lý kế toán"
credits: 3
faculty: "Business Administration"
description: "Cung cấp kiến thức nền tảng về nguyên lý kế toán, bao gồm các khái niệm, nguyên tắc, quy trình ghi nhận, tổng hợp và trình bày thông tin kinh tế - tài chính trong doanh nghiệp."
learning_outcomes:
  - "Hiểu và phân biệt các khái niệm kế toán cơ bản: tài sản, nợ phải trả, vốn chủ sở hữu, doanh thu, chi phí"
  - "Nắm vững nguyên tắc kế toán và phương pháp ghi nhận các nghiệp vụ kinh tế"
  - "Lập và đọc hiểu các báo cáo tài chính: Bảng cân đối kế toán, Báo cáo kết quả hoạt động kinh doanh, Báo cáo lưu chuyển tiền tệ"
  - "Thực hiện các bút toán điều chỉnh cuối kỳ và tính giá thành sản phẩm"
  - "Phân tích và đánh giá tình hình tài chính doanh nghiệp từ báo cáo tài chính"
