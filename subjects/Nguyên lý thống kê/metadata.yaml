subject_code: "ST"
subject_name: "Nguyên lý thống kê"
credits: 3
faculty: "Business Administration"
description: "Cung cấp kiến thức về các phương pháp thu thập, tổng hợp, phân tích và diễn giải dữ liệu thống kê; ứng dụng vào ra quyết định quản trị kinh doanh."
learning_outcomes:
  - "Hiểu các khái niệm cơ bản của thống kê: tổng thể, mẫu, biến, tần suất"
  - "Tính toán và diễn giải các đại lượng thống kê mô tả: trung bình, trung vị, phương sai, độ lệch chuẩn"
  - "Áp dụng phân phối xác suất vào bài toán kinh doanh"
  - "Thực hiện kiểm định giả thuyết thống kê và phân tích tương quan, hồi quy"
  - "Sử dụng phần mềm thống kê để phân tích dữ liệu thực tế"
